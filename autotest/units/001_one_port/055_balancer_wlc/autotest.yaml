steps:
- ipv4Update: "0.0.0.0/0 -> 200.0.0.1"
- ipv6Update: "::/0 -> fe80::1"
- cli:
    - balancer real enable balancer0 10.1.0.55 tcp 443 2443::1 443
    - balancer real enable balancer0 10.1.0.55 tcp 443 2443::2 443
    - balancer real enable balancer0 10.1.0.55 tcp 443 2443::3 443
    - balancer real flush
- sendPackets:
    - port: kni0
      send: 001-send.pcap
      expect: 001-expect.pcap
- cli_check: |
    YANET_FORMAT_COLUMNS=module,virtual_ip,proto,virtual_port,scheduler,real_ip,real_port,enabled,weight,connections,packets,bytes balancer real any
    module     virtual_ip  proto  virtual_port  scheduler  real_ip  real_port  enabled  weight  connections  packets  bytes
    ---------  ----------  -----  ------------  ---------  -------  ---------  -------  ------  -----------  -------  -----
    balancer0  10.1.0.55   tcp    443           wlc        2443::1  443        true     2       35           35       3430
    balancer0  10.1.0.55   tcp    443           wlc        2443::2  443        true     1       14           14       1372
    balancer0  10.1.0.55   tcp    443           wlc        2443::3  443        true     1       15           15       1470
    balancer0  10.1.0.55   tcp    443           wlc        2443::4  443        false    4       0            0        0


- cli:
    - balancer real enable balancer0 10.1.0.55 tcp 443 2443::4 443
    - balancer real flush
- sendPackets:
    - port: kni0
      send: 002-send.pcap
      expect: 002-expect.pcap
- cli_check: |
    YANET_FORMAT_COLUMNS=module,virtual_ip,proto,virtual_port,scheduler,real_ip,real_port,enabled,weight,connections,packets,bytes balancer real any
    module     virtual_ip  proto  virtual_port  scheduler  real_ip  real_port  enabled  weight  connections  packets  bytes
    ---------  ----------  -----  ------------  ---------  -------  ---------  -------  ------  -----------  -------  -----
    balancer0  10.1.0.55   tcp    443           wlc        2443::1  443        true     2       37           37       3626
    balancer0  10.1.0.55   tcp    443           wlc        2443::2  443        true     1       16           16       1568
    balancer0  10.1.0.55   tcp    443           wlc        2443::3  443        true     1       15           15       1470
    balancer0  10.1.0.55   tcp    443           wlc        2443::4  443        true     4       60           60       5880

- sleep: 2
- sendPackets:
    - port: kni0
      send: 003-send.pcap
      expect: 003-expect.pcap
- cli_check: |
    YANET_FORMAT_COLUMNS=module,virtual_ip,proto,virtual_port,scheduler,real_ip,real_port,enabled,weight,connections,packets,bytes balancer real any
    module     virtual_ip  proto  virtual_port  scheduler  real_ip  real_port  enabled  weight  connections  packets  bytes
    ---------  ----------  -----  ------------  ---------  -------  ---------  -------  ------  -----------  -------  -----
    balancer0  10.1.0.55   tcp    443           wlc        2443::1  443        true     2       44           44       4312
    balancer0  10.1.0.55   tcp    443           wlc        2443::2  443        true     1       18           18       1764
    balancer0  10.1.0.55   tcp    443           wlc        2443::3  443        true     1       17           17       1666
    balancer0  10.1.0.55   tcp    443           wlc        2443::4  443        true     4       81           81       7938

